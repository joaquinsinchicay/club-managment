name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  validate-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repository docs
        run: npm run validate:docs

      - name: Check primitives (UI anti-patterns)
        run: npm run check:primitives

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
